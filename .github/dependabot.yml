version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(go)

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '04:15'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(frontend)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(actions)
