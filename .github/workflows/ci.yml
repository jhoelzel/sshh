name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and race tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit
      - name: Test Go
        run: go test ./...
      - name: Test Go with race detector
        run: go test -race ./...
      - name: Vet Go
        run: go vet ./...
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Test frontend
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  security:
    name: Dependency security
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Scan reachable Go vulnerabilities
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          repo-checkout: 'false'
          go-version-file: go.mod
          cache-dependency-path: go.sum
          go-package: ./...
          output-format: text

  browser-e2e:
    name: Browser workspace interactions
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit
      - name: Install pinned Chromium and system dependencies
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Test workspace interactions
        working-directory: frontend
        run: npm run test:e2e

  bindings:
    name: Wails bindings and macOS build
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Regenerate bindings and compile native host
        run: make check-bindings

  native-linux:
    name: Linux desktop and native smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes dbus-x11 libgtk-3-dev libwebkit2gtk-4.1-dev xauth xvfb
      - name: Verify supported WebKitGTK runtime
        run: |
          pkg-config --atleast-version=2.41.0 webkit2gtk-4.1
          printf 'WebKitGTK %s (4.1 ABI)\n' "$(pkg-config --modversion webkit2gtk-4.1)"
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - name: Test Linux PTY resize and process cleanup
        run: go test -count=1 -timeout=5m ./internal/adapter/localpty ./internal/usecase/session
      - name: Compile Linux desktop host
        working-directory: cmd/shhh
        run: '"$(go env GOPATH)/bin/wails" build -clean -nopackage -trimpath -tags "webkit2_41" -o shhh-linux'
      - name: Build Linux native smoke host
        working-directory: cmd/shhh
        run: 'VITE_TERMINAL_BENCHMARK=1 "$(go env GOPATH)/bin/wails" build -clean -nopackage -trimpath -tags "webkit2_41" -o shhh-linux-smoke'
      - name: Run Linux WebKitGTK terminal smoke
        env:
          LIBGL_ALWAYS_SOFTWARE: '1'
          WEBKIT_DISABLE_COMPOSITING_MODE: '1'
        run: |
          status=0
          dbus-run-session -- xvfb-run -a go run ./cmd/terminalbench \
            -mode smoke \
            -app "$GITHUB_WORKSPACE/build/bin/shhh-linux-smoke" \
            -report "$RUNNER_TEMP/m2-linux-amd64-smoke.json" \
            -timeout 90s || status=$?
          if test -f "$RUNNER_TEMP/m2-linux-amd64-smoke.json"; then
            cat "$RUNNER_TEMP/m2-linux-amd64-smoke.json"
          fi
          exit "$status"

  native-windows:
    name: Windows desktop build
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - name: Test Windows ConPTY adapter
        run: go test -count=1 -timeout=2m ./internal/adapter/localpty
      - name: Compile Windows desktop host
        working-directory: cmd/shhh
        run: |
          $wails = Join-Path (go env GOPATH) 'bin/wails.exe'
          & $wails build -clean -nopackage -trimpath -webview2 error -o shhh-windows.exe
